<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Abstract document layers: two overlapping rectangles suggesting structured information -->
  <!-- Back layer (navy) - slightly offset down-right -->
  <rect x="14" y="14" width="36" height="44" rx="3" fill="#1B2A4A"/>
  <!-- Front layer (teal) - offset up-left, creating depth -->
  <rect x="8" y="6" width="36" height="44" rx="3" fill="#0D9488"/>
  <!-- Horizontal lines on front layer suggesting document text -->
  <line x1="16" y1="20" x2="36" y2="20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="36" y2="28" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="36" x2="28" y2="36" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
</svg>
