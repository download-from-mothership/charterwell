<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
  </style>
  <!-- Monogram icon (centered, white variant) -->
  <g transform="translate(228, 0)">
    <rect x="14" y="14" width="36" height="44" rx="3" fill="#FFFFFF" opacity="0.3"/>
    <rect x="8" y="6" width="36" height="44" rx="3" fill="#FFFFFF"/>
    <line x1="16" y1="20" x2="36" y2="20" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="28" x2="36" y2="28" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="36" x2="28" y2="36" stroke="#1B2A4A" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Wordmark (centered below, white) -->
  <text x="260" y="105" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-weight="600" font-size="40" letter-spacing="2.5" fill="#FFFFFF">Charterwell</text>
