# Deploy static export (`out/`) via Direct Upload.
#
# Credentials: GitHub → Settings → Environments → [name] → Environment secrets (or variables).
# Job uses `environment.name` below — default **production**. To use another name, add a
# **repository** variable `CLOUDFLARE_ENVIRONMENT` with that environment’s exact name.
#   CLOUDFLARE_API_TOKEN — Cloudflare token, Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# Repository- or org-level Secrets/Variables still work if you omit `environment` later.
#
# Cloudflare’s “Connect to Git” in the dashboard is optional; this workflow is your Git-based CI.
name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ vars.CLOUDFLARE_ENVIRONMENT || 'production' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Check Cloudflare credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty. Add it to the GitHub **Environment** used by this job (default: production), or to repo/org secrets. Name must be exactly CLOUDFLARE_API_TOKEN. Token needs Account → Cloudflare Pages → Edit."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is empty. Add it to the same GitHub **Environment** (or repo/org secrets). Name must be exactly CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi
          echo "Cloudflare credentials are configured."

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy out --project-name=charterwell --commit-dirty=true
