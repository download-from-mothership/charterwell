# Deploy static export (`out/`) via Direct Upload. Configure either **Secrets** or **Variables**
# (Settings → Secrets and variables → Actions). Prefer **Secrets** for CLOUDFLARE_API_TOKEN.
#   CLOUDFLARE_API_TOKEN — Custom token with Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
#
# If you use org-level variables, ensure this repo is allowed to access them.
# Environment-scoped secrets need `environment:` on the job.
#
# Cloudflare’s “Connect to Git” in the dashboard is optional; this workflow is your Git-based CI.
name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Check Cloudflare credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty. Add a Repository or Organization **Secret** or **Variable** with that exact name (not CF_TOKEN). Prefer Secret. Token needs Account → Cloudflare Pages → Edit."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is empty. Add a Repository or Organization Secret or Variable with that exact name."
            exit 1
          fi
          echo "Cloudflare credentials are configured."

      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy out --project-name=charterwell --commit-dirty=true
