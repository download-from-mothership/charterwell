# Deploy static export (`out/`) via Direct Upload. Requires repo secrets:
#   CLOUDFLARE_API_TOKEN — Custom token with Account → Cloudflare Pages → Edit
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID (same as wrangler.toml account_id)
#
# Cloudflare’s “Connect to Git” in the dashboard is optional; this workflow is your Git-based CI.
name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.76.0"
          command: pages deploy out --project-name=charterwell --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment URL
        run: echo "${{ steps.deploy.outputs.deployment-url }}"
